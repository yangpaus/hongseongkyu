<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
  // ── 상태 ──
  const scheduleItems = [
    { time: '11:30', title: '수원방송 경기도지사 후보 대담', loc: '월드컵로 336' },
    { time: '13:30', title: '민주노총 돌봄공공노조 정책 제안 기자회견', loc: '경기도의회 브리핑룸' },
    { time: '19:00', title: '북한 내고향여성축구단 환영 및 수원FC위민 경기 관람', loc: '수원종합운동장' },
  ];

  // ── 일정 항목 폼 렌더링 ──
  let dragSrcIndex = null;

  function renderScheduleInputs() {
    const container = document.getElementById('schedule-inputs');
    container.innerHTML = scheduleItems.map((item, i) => `
      <div class="sif" draggable="true" data-index="${i}" style="cursor: grab;">
        <div style="font-size:10px; color:#bbb; margin-bottom:5px; user-select:none;">⠿ 드래그로 순서 변경</div>
        <button class="remove-btn" onclick="removeItem(${i})">✕</button>
        <div class="fg">
          <label>시간</label>
          <input type="text" value="${item.time}" oninput="scheduleItems[${i}].time = this.value; updatePreview()">
        </div>
        <div class="fg">
          <label>일정명</label>
          <textarea rows="2" oninput="scheduleItems[${i}].title = this.value; updatePreview()" style="width:100%; padding:6px 9px; border:1px solid #ddd; border-radius:6px; font-size:12px; font-family:inherit; color:#111; resize:none;">${item.title}</textarea>
        </div>
        <div class="fg">
          <label>장소</label>
          <input type="text" value="${item.loc}" oninput="scheduleItems[${i}].loc = this.value; updatePreview()">
        </div>
      </div>
    `).join('');

    container.querySelectorAll('.sif').forEach(el => {
      el.addEventListener('dragstart', e => {
        dragSrcIndex = parseInt(el.dataset.index);
        el.style.opacity = '0.4';
      });
      el.addEventListener('dragend', () => {
        el.style.opacity = '1';
      });
      el.addEventListener('dragover', e => {
        e.preventDefault();
        el.style.outline = '2px dashed #e8202a';
      });
      el.addEventListener('dragleave', () => {
        el.style.outline = '';
      });
      el.addEventListener('drop', e => {
        e.preventDefault();
        el.style.outline = '';
        const targetIndex = parseInt(el.dataset.index);
        if (dragSrcIndex === null || dragSrcIndex === targetIndex) return;
        const [moved] = scheduleItems.splice(dragSrcIndex, 1);
        scheduleItems.splice(targetIndex, 0, moved);
        dragSrcIndex = null;
        renderScheduleInputs();
        updatePreview();
      });
    });
  }

  function addItem() {
    scheduleItems.push({ time: '', title: '', loc: '' });
    renderScheduleInputs();
    updatePreview();
  }

  function removeItem(i) {
    scheduleItems.splice(i, 1);
    renderScheduleInputs();
    updatePreview();
  }

  function getDefaultValues() {
  const KST = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Seoul' }));
  
  // 날짜: +1일
  KST.setDate(KST.getDate() + 1);
  const days = ['일', '월', '화', '수', '목', '금', '토'];
  const dateStr = `${KST.getMonth() + 1}/${KST.getDate()}(${days[KST.getDay()]})`;

  // D-day: 6월 3일 기준
  const election = new Date(KST.getFullYear(), 5, 3); // 6월 3일
  const today = new Date(KST.getFullYear(), KST.getMonth(), KST.getDate());
  const diff = Math.round((election - today) / (1000 * 60 * 60 * 24));
  const ddayStr = diff > 0 ? `D-${diff}` : diff === 0 ? 'D-day' : `D+${Math.abs(diff)}`;

  return { dateStr, ddayStr };
}

  // ── 미리보기 업데이트 ──

    const val = id => document.getElementById(id).value;
    document.getElementById('p-date').textContent = val('f-date');
    document.getElementById('p-dday').textContent = val('f-dday');

    document.getElementById('p-schedule').innerHTML = scheduleItems.map((item, i) => `

        <div class="schedule-time">${item.time}</div>
        <div class="schedule-details">
          <div class="schedule-title">${item.title.replace(/\n/g, '<br>')}</div>
          ${item.loc ? `<div class="schedule-location"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 23.77 28.69" style="width:1em;height:1em;flex-shrink:0;vertical-align:-3px;"><path fill="#231815" d="M17.85,1.59c1.82,1.06,3.26,2.5,4.32,4.32s1.59,3.8,1.59,5.94c0,1.62-.31,3.16-.93,4.61s-1.47,2.71-2.57,3.81l-8.39,8.41L3.49,20.25c-1.09-1.08-1.95-2.34-2.57-3.79s-.93-2.97-.93-4.58c0-2.16.53-4.14,1.59-5.96S4.1,2.66,5.92,1.59s3.81-1.59,5.96-1.59,4.14.53,5.96,1.59ZM7.04,3.63c-1.45.83-2.58,1.96-3.41,3.41s-1.24,3.06-1.24,4.84c0,1.33.24,2.55.71,3.68s1.17,2.13,2.07,3.02l6.7,6.73,6.7-6.7c.91-.91,1.6-1.92,2.07-3.05s.71-2.35.71-3.68c0-1.78-.41-3.39-1.24-4.84s-1.96-2.58-3.41-3.41-3.06-1.24-4.84-1.24-3.39.41-4.84,1.24ZM9.7,10.63c.23-.38.54-.69.93-.93s.8-.35,1.25-.35.87.12,1.25.35.69.54.93.93.35.8.35,1.25-.12.87-.35,1.25-.54.69-.93.93-.8.35-1.25.35-.87-.12-1.25-.35-.69-.54-.93-.93-.35-.8-.35-1.25.12-.87.35-1.25Z"/></svg> ${item.loc}</div>` : ''}
        </div>
      </div>
      ${i < scheduleItems.length - 1 ? '<div class="schedule-sep"></div>' : ''}
        `).join('');
  }

  // ── 이미지 로드 ──
  function loadImage(input) {
  if (!input.files || !input.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => {
    const original = new Image();
    original.onload = () => {
      const targetRatio = 16 / 9;
      const srcRatio = original.width / original.height;

      let sx, sy, sw, sh;
      if (srcRatio > targetRatio) {
        // 원본이 더 넓음 → 좌우 크롭
        sh = original.height;
        sw = sh * targetRatio;
        sx = (original.width - sw) / 2;
        sy = 0;
      } else {
        // 원본이 더 좁음 → 상하 크롭
        sw = original.width;
        sh = sw / targetRatio;
        sx = 0;
        sy = (original.height - sh) / 2;
      }

      const c = document.createElement('canvas');
      c.width = 1600;
      c.height = 900;
      c.getContext('2d').drawImage(original, sx, sy, sw, sh, 0, 0, 1600, 900);

      const img = document.getElementById('header-img');
      img.src = c.toDataURL('image/png');
      img.style.display = 'block';
      document.getElementById('header-placeholder').style.display = 'none';
    };
    original.src = e.target.result;
  };
  reader.readAsDataURL(input.files[0]);
}

  // ── PNG 내보내기 ──
  async function exportPng() {
    const btn = document.getElementById('export-btn');
    btn.textContent = '저장 중...';
    btn.disabled = true;

    try {
      const card = document.getElementById('schedule-card');
      const canvas = await html2canvas(card, {
        scale: 2,
        useCORS: true,
        allowTaint: true,
        backgroundColor: '#dde9f2',
      });
      const a = document.createElement('a');
      a.download = `일정카드_${document.getElementById('f-date').value || 'export'}.png`;
      a.href = canvas.toDataURL('image/png');
      a.click();
    } catch (e) {
      alert('저장 실패: ' + e.message);
    }

    btn.textContent = 'PNG 저장';
    btn.disabled = false;
  }

  // ── 초기화 ──
  const { dateStr, ddayStr } = getDefaultValues();
  document.getElementById('f-date').value = dateStr;
  document.getElementById('f-dday').value = ddayStr;
  renderScheduleInputs();
  updatePreview();
</script>
